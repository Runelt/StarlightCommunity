<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>별빛 커뮤니티</title>
    <link rel="stylesheet" href="alert.css">
    <style>
        :root {
            --bg: #f6f7fb;
            --card-bg: #ffffff;
            --text-main: #1f2430;
            --text-sub: #6b7280;
            --primary: #4f6df5;
            --primary-hover: #3d59e0;
            --border: #e9eaf0;
            --radius: 14px;
            --shadow: 0 2px 10px rgba(20, 20, 43, 0.06);
            --shadow-hover: 0 6px 20px rgba(20, 20, 43, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 32px 16px 60px;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-y: scroll;
        }

        header {
            max-width: 640px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 22px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
        }

        header .header-actions {
            display: flex;
            gap: 8px;
        }

        #posts {
            max-width: 640px;
            margin: 0 auto;
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .post {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow);
            transition: box-shadow 0.18s ease, transform 0.18s ease;
        }

        .post:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .post h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
        }

        .post h3 a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
        }

        .post h3 a:hover {
            color: var(--primary);
        }

        .post p {
            margin: 0;
            color: var(--text-sub);
            font-size: 14px;
            line-height: 1.5;
        }

        .empty-state,
        .error-state,
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sub);
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .error-state {
            color: #d64545;
        }

        #pagination {
            max-width: 640px;
            margin: 24px auto 0;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        #pagination button {
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-main);
            padding: 7px 13px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }

        #pagination button:hover:not(.active) {
            background-color: #eef1ff;
            border-color: var(--primary);
        }

        #pagination button.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            cursor: default;
        }

        button {
            padding: 9px 18px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: background-color 0.15s ease, transform 0.05s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.97);
        }

        #login {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        #login:hover {
            background-color: #eef1ff;
            border-color: var(--primary);
            color: var(--primary);
        }
    </style>
</head>

<body>
    <header>
        <h1>게시판</h1>
        <div class="header-actions">
            <button id="login">로그인</button>
            <button id="writeBtn">글쓰기</button>
        </div>
    </header>
    <main>
        <div id="posts"></div>
        <div id="pagination"></div>
    </main>
    <div id="custom-toast-container"></div>
    <script type="module" src="index.js"></script>
    <script src="alert.js"></script>
</body>

</html>
